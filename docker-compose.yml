# WBS Frontend - Next.js
#
# Build: docker compose build --build-arg NEXT_PUBLIC_API_HOST=http://202.155.94.226/api
# Deploy: docker compose up -d --build

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_HOST: ${NEXT_PUBLIC_API_HOST:-http://localhost:3005/api}
        NEXT_PUBLIC_BOT_PRIMARY_API: ${NEXT_PUBLIC_BOT_PRIMARY_API:-http://localhost:3006}
        NEXT_PUBLIC_BOT_SECONDARY_API: ${NEXT_PUBLIC_BOT_SECONDARY_API:-http://localhost:3007}
    image: wbs-frontend:latest
    container_name: wbs-frontend
    restart: unless-stopped
    ports:
      - "3010:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
